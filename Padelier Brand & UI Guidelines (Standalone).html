">\n      <div style=\"display:flex;justify-content:space-between;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#8A8A8A;\">\n        <span>Padelier™<\u002Fspan>\n        <span>Brand · Logo · UI Guidelines · v1.0<\u002Fspan>\n      <\u002Fdiv>\n      <img src=\"892714f6-7396-4da8-9e5e-fde24d415cfb\" alt=\"Padelier\" style=\"max-width:560px;width:100%;height:auto;margin-top:44px;display:block;\">\n      <div style=\"font-family:'Fraunces';font-style:italic;color:#BFA36A;font-size:clamp(20px,3vw,28px);margin-top:26px;\">The art of a great game.<\u002Fdiv>\n      <p style=\"color:#D6D3CE;max-width:56ch;margin-top:10px;font-size:16px;\">One source of truth: why Padelier exists, how it looks, how it sounds, and how it's built — foundations, logo system, and interface, together.<\u002Fp>\n      <div style=\"display:flex;gap:44px;margin-top:36px;flex-wrap:wrap;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#8A8A8A;\">\n        <div>Scope<b style=\"color:#F7F5F2;font-weight:600;display:block;letter-spacing:0;text-transform:none;font-size:14px;margin-top:3px;\">Master brand · app-aligned<\u002Fb><\u002Fdiv>\n        <div>Product<b style=\"color:#F7F5F2;font-weight:600;display:block;letter-spacing:0;text-transform:none;font-size:14px;margin-top:3px;\">The host's session tool<\u002Fb><\u002Fdiv>\n        <div>Feeling<b style=\"color:#F7F5F2;font-weight:600;display:block;letter-spacing:0;text-transform:none;font-size:14px;margin-top:3px;\">Hosted, fair, alive<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- TOC -->\n  <section style=\"max-width:960px;margin:0 auto;padding:56px 32px;\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">00<\u002Fspan>Contents<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">One brand, one source of truth.<\u002Fdiv>\n    <div style=\"columns:2;column-gap:48px;margin-top:20px;\">\n      <sc-for list=\"{{ toc }}\" as=\"t\" hint-placeholder-count=\"16\">\n        <a href=\"{{ t.href }}\" style=\"display:block;padding:9px 0;border-bottom:1px solid rgba(13,13,13,.1);font-size:15px;color:#141412;\"><span style=\"color:#8A8A8A;font-family:'Space Grotesk';margin-right:14px;font-size:13px;\">{{ t.n }}<\u002Fspan>{{ t.label }}<\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 01 WHAT -->\n  <section id=\"what\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">01<\u002Fspan>What Padelier Is<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">The tool that runs the game.<\u002Fdiv>\n    <p style=\"font-size:20px;line-height:1.55;color:#33322e;max-width:60ch;margin-top:16px;\">Padelier is the host's tool for running a live padel session — fair rotations, effortless scoring, and real standings that update as you play. It turns the person organising the game into a great host, and makes sure every player gets a fair, flowing game.<\u002Fp>\n    <p style=\"max-width:62ch;\">Most padel apps help you book a court or find a partner. Padelier owns the part that happens once everyone has arrived and the balls are out: running the actual play. That is the white space — and it is the hardest thing to do well, which is exactly why it is worth owning.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid rgba(13,13,13,.1);border-radius:16px;overflow:hidden;background:#fff;margin-top:22px;\">\n      <div style=\"padding:24px 26px;border-right:1px solid rgba(13,13,13,.1);\">\n        <div style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:#2E8B57;margin-bottom:12px;\">Padelier is<\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;\"><li style=\"margin-bottom:7px;font-size:14.5px;\">The operating layer for a live session<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">A fair-rotation engine for any player count<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">Live scoring and real, honest standings<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">A way to make the host look effortless<\u002Fli><\u002Ful>\n      <\u002Fdiv>\n      <div style=\"padding:24px 26px;\">\n        <div style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:#D36A4A;margin-bottom:12px;\">Padelier is not<\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;\"><li style=\"margin-bottom:7px;font-size:14.5px;\">A court-booking marketplace<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">A partner-matchmaking network<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">A global rankings / social feed (yet)<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">Another loud, gamified sports app<\u002Fli><\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#0D0D0D;color:#F7F5F2;border-radius:20px;padding:36px 40px;margin-top:22px;\">\n      <div style=\"font-family:'Fraunces';font-size:clamp(20px,3vw,28px);\">Padelier doesn't just schedule matches. It makes sure <em style=\"color:#BFA36A;font-style:italic;\">every game is a fair game<\u002Fem> — and makes the host the hero for it.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 FOUNDATION -->\n  <section id=\"foundation\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">02<\u002Fspan>Foundation<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Why we exist.<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:26px;\">\n      <sc-for list=\"{{ foundation }}\" as=\"f\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\">\n          <div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">{{ f.k }}<\u002Fdiv>\n          <div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;font-weight:500;\">{{ f.h }}<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#4a4944;margin:0;\">{{ f.p }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:38px 0 14px;\">Positioning statement<\u002Fh3>\n    <p style=\"font-size:20px;line-height:1.55;color:#33322e;max-width:60ch;\">For the person who organises the game, Padelier is the tool that runs a beautiful, fair padel session in real time — so play flows, standings stay honest, and the host never touches a spreadsheet. Where others book the court, Padelier runs the play.<\u002Fp>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:38px 0 14px;\">The white space<\u002Fh3>\n    <p style=\"max-width:62ch;\">The padel market is crowded on <strong>booking<\u002Fstrong> and <strong>matchmaking<\u002Fstrong> — that lane is well defended. It is wide open on <strong>running the session itself<\u002Fstrong>: fair rotation across uneven player counts and multiple courts, live scoring, live standings, a spectator view. That is a genuine product truth Padelier can own, because the fairness engine is hard to build and almost no one has built it well.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 03 NAME -->\n  <section id=\"name\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">03<\u002Fspan>The Name<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Padelier — the one who hosts the game.<\u002Fdiv>\n    <p style=\"font-size:20px;line-height:1.55;color:#33322e;max-width:60ch;margin-top:16px;\">A sommelier curates wine. A hôtelier curates a stay. A <strong>padelier<\u002Fstrong> curates the game — the person who makes sure everyone gets a fair, flowing, memorable session.<\u002Fp>\n    <p style=\"max-width:62ch;\">The <strong>-ier<\u002Fstrong> ending is the language of craft and hospitality: sommelier, hôtelier, atelier. It tells the world this is padel done with care and taste. But the meaning we lean on is <strong>host<\u002Fstrong>, not luxury — a padelier isn't a velvet rope, they're the person who makes everyone feel personally looked after. That is the brand in one word: <strong>hospitality, encoded in software.<\u002Fstrong><\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:22px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Meaning<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">The host of the game<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">The curator who runs a great session so everyone belongs.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Say it<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">pa·del·ier<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">“PAH-del-yay.” Rhymes with atelier. Warm, not stuffy.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Feeling<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Considered &amp; warm<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">Premium as in thoughtful, never premium as in exclusive.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 PILLARS -->\n  <section id=\"pillars\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">04<\u002Fspan>Brand Pillars<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Four things we always are.<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:24px;\">\n      <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:28px;\">\n          <div style=\"font-family:'Space Grotesk';font-size:13px;color:#BFA36A;letter-spacing:0.1em;\">{{ p.idx }}<\u002Fdiv>\n          <div style=\"font-family:'Fraunces';font-size:24px;margin:6px 0 8px;font-weight:500;\">{{ p.title }}<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#4a4944;margin:0;\">{{ p.desc }}<\u002Fp>\n          <div style=\"font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#8A8A8A;margin-top:14px;border-top:1px solid rgba(13,13,13,.06);padding-top:12px;\">Powered by · {{ p.feat }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 PERSONALITY -->\n  <section id=\"personality\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">05<\u002Fspan>Personality &amp; Archetype<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Premium is the finish, not the substance.<\u002Fdiv>\n    <p style=\"font-size:20px;line-height:1.55;color:#33322e;max-width:60ch;margin-top:16px;\">Padelier is a gracious host who also knows the game cold — confident, warm, precise, effortless. Premium in taste, welcoming in spirit.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:26px;align-items:start;\">\n      <div>\n        <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:0 0 14px;\">The mix<\u002Fh3>\n        <sc-for list=\"{{ personalityBars }}\" as=\"b\" hint-placeholder-count=\"4\">\n          <div style=\"margin-bottom:16px;\">\n            <div style=\"display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px;\"><b style=\"font-weight:600;\">{{ b.label }}<\u002Fb><span style=\"font-family:'Space Grotesk';color:#8A8A8A;\">{{ b.pct }}%<\u002Fspan><\u002Fdiv>\n            <div style=\"height:8px;background:#D6D3CE;border-radius:99px;overflow:hidden;\"><div style=\"height:100%;border-radius:99px;background:{{ b.color }};width:{{ b.pct }}%;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <p style=\"color:#8A8A8A;font-size:13px;margin-top:10px;\">Premium as the <em>finish<\u002Fem> — the last 35% that makes everything feel considered — sitting on a foundation of warmth, energy, and quiet intelligence.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:0 0 14px;\">Archetype<\u002Fh3>\n        <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;margin-bottom:14px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Primary · The Creator<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Designs experiences.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">Obsesses over quality, builds the thing that brings people together, sweats every detail so the host doesn't have to.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Secondary · The Sage<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Makes it fair &amp; clear.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">Brings calm intelligence to the chaos of a live session — honest standings, transparent rotations, no drama.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:38px 0 14px;\">Brand keywords<\u002Fh3>\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;\">\n      <sc-for list=\"{{ keywords }}\" as=\"k\" hint-placeholder-count=\"11\">\n        <span style=\"border:1px solid rgba(13,13,13,.1);border-radius:99px;padding:7px 15px;font-size:13.5px;background:#fff;\">{{ k }}<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"background:#0D0D0D;color:#F7F5F2;border-radius:20px;padding:36px 40px;margin-top:22px;\"><div style=\"font-family:'Fraunces';font-size:clamp(20px,3vw,28px);\">The emotional goal: every host and player should feel <em style=\"color:#BFA36A;font-style:italic;\">“I'm part of something special”<\u002Fem> — never “I'm using another sports app.”<\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 VOICE -->\n  <section id=\"voice\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">06<\u002Fspan>Voice &amp; Tone<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Warm confidence. We don't shout.<\u002Fdiv>\n    <p style=\"font-size:20px;line-height:1.55;color:#33322e;max-width:60ch;margin-top:16px;\">We speak like a great host: calm, clear, quietly witty, and genuinely pleased for you. Restrained — but never cold. The warmth is the point.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:22px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Clear<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Say the useful thing.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">Short sentences. One idea. Never make the user decode.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Warm<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Be pleased for them.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">Acknowledge the moment like a host would — with grace, not confetti.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Confident<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">No hedging, no hype.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">We don't need three exclamation marks. Calm certainty reads as premium.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:38px 0 14px;\">In practice<\u002Fh3>\n    <sc-for list=\"{{ voice }}\" as=\"v\" hint-placeholder-count=\"5\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px;\">\n        <div style=\"border-radius:14px;padding:16px 18px;background:#fbeee9;border:1px solid #eed5cb;\"><div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:#D36A4A;margin-bottom:6px;\">Don't<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:17px;\">{{ v.dont }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"border-radius:14px;padding:16px 18px;background:#fff;border:1px solid rgba(13,13,13,.1);\"><div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:#2E8B57;margin-bottom:6px;\">Do<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:17px;\">{{ v.do }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <p style=\"color:#8A8A8A;font-size:13px;margin-top:8px;\">A note on the whisper: quiet-luxury restraint is right for marketing and idle states. But the moment someone plays a great point or wins a session, let the warmth through. A host who never celebrates isn't refined — they're cold.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 07 AUDIENCE -->\n  <section id=\"audience\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">07<\u002Fspan>Audience<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Host first. Players close behind.<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:24px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Primary · The Host<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">The one who organises.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">The club coach, the community organiser, the friend who always sets up Thursday games. Padelier makes them look effortless. <strong>Win the host and you win the room.<\u002Fstrong><\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Secondary · The Players<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">The ones who show up to play.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">They join by code, want a fair game, and want to see where they stand. Their delight is what keeps the host coming back.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:38px 0 14px;\">Who they are<\u002Fh3>\n    <p style=\"max-width:62ch;\">Design-literate adults, roughly 24–45 — professionals, creatives, people who notice when something is made with care. They don't want a louder sports app; they want the game to feel considered. Reach them through the host, not around them.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid rgba(13,13,13,.1);border-radius:16px;overflow:hidden;background:#fff;margin-top:20px;\">\n      <div style=\"padding:24px 26px;border-right:1px solid rgba(13,13,13,.1);\"><div style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:#2E8B57;margin-bottom:12px;\">The reference points<\u002Fdiv><ul style=\"margin:0;padding-left:18px;\"><li style=\"margin-bottom:7px;font-size:14.5px;\">The calm of a well-run members' club — hospitality, not exclusivity<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">The disappearing-tech feel of the best Apple software<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">The warmth of a community run by someone who cares<\u002Fli><\u002Ful><\u002Fdiv>\n      <div style=\"padding:24px 26px;\"><div style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;color:#D36A4A;margin-bottom:12px;\">Not the reference points<\u002Fdiv><ul style=\"margin:0;padding-left:18px;\"><li style=\"margin-bottom:7px;font-size:14.5px;\">ESPN broadcast energy<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">A sports federation or governing body<\u002Fli><li style=\"margin-bottom:7px;font-size:14.5px;\">A gamified, badge-spamming fitness app<\u002Fli><\u002Ful><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 MESSAGING -->\n  <section id=\"messaging\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">08<\u002Fspan>Messaging<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">What we say, and how.<\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Tagline · primary<\u002Fh3>\n    <div style=\"background:#0D0D0D;color:#F7F5F2;border-radius:20px;padding:36px 40px;\"><div style=\"font-family:'Fraunces';font-style:italic;font-size:clamp(22px,3vw,30px);\">The art of a great game.<\u002Fdiv><\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Tagline · alternates<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n      <sc-for list=\"{{ altTaglines }}\" as=\"a\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:19px;\">{{ a.line }}<\u002Fdiv><p style=\"font-size:13.5px;color:#4a4944;margin:8px 0 0;\">{{ a.note }}<\u002Fp><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Elevator pitch<\u002Fh3>\n    <p style=\"font-size:20px;line-height:1.55;color:#33322e;max-width:60ch;\">Padelier is the host's tool for running a live padel session. It sorts fair rotations for any number of players, takes scores in one tap, and keeps honest standings in real time — so the game flows, everyone gets a fair turn, and the host never touches a spreadsheet.<\u002Fp>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Boilerplate<\u002Fh3>\n    <p style=\"max-width:64ch;\">Padelier is a beautifully considered tool for running social padel. Built around a fairness engine that gives every player a fair mix of games, partners, and rest, it turns the logistics of a live session — rotations, scoring, standings — into something effortless, and turns whoever's hosting into a great one. Padelier doesn't book your court or find your partner; it runs the play, and makes every game a fair game.<\u002Fp>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Key messages<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n      <sc-for list=\"{{ keyMessages }}\" as=\"km\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">{{ km.k }}<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:8px 0 0;\">{{ km.p }}<\u002Fp><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 LOGO -->\n  <section id=\"logo\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">09<\u002Fspan>Logo<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">The wordmark &amp; the mark.<\u002Fdiv>\n    <p style=\"max-width:64ch;margin-top:10px;\">Set in a warm editorial serif (delivered as fixed vector outlines — no font install needed). The tittle of the \"i\" is replaced by the gold ball: the padel ball, and a quiet nod to the golden point.<\u002Fp>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Primary lockup<\u002Fh3>\n    <div style=\"border:1px solid rgba(13,13,13,.1);border-radius:18px;padding:48px;display:flex;align-items:center;justify-content:center;background:#fff;\">\n      <img src=\"69b27893-7adb-4d8a-ba92-4814d88c1c8f\" alt=\"Padelier\" style=\"max-width:560px;width:100%;height:auto;\">\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;\">\n      <div style=\"border:1px solid rgba(13,13,13,.1);border-radius:18px;padding:30px;display:flex;align-items:center;justify-content:center;background:#fff;\"><img src=\"8d58fb85-4fc2-489f-9278-bfa4cf15efbc\" alt=\"Padelier stacked\" style=\"max-width:100%;height:auto;\"><\u002Fdiv>\n      <div style=\"border-radius:18px;padding:30px;display:flex;align-items:center;justify-content:center;background:#0D0D0D;\"><img src=\"892714f6-7396-4da8-9e5e-fde24d415cfb\" alt=\"Padelier on dark\" style=\"max-width:100%;height:auto;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8A8A;font-weight:600;margin-top:10px;text-align:left;\">Stacked lockup (square spaces) · Reversed lockup (dark surfaces)<\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Wordmark colorways<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n      <div style=\"border-radius:18px;padding:34px;display:flex;align-items:center;justify-content:center;background:#0D0D0D;\"><img src=\"0b78e149-5aab-4ca8-8ca9-935b330ac85a\" alt=\"Padelier ivory\" style=\"max-width:100%;height:auto;\"><\u002Fdiv>\n      <div style=\"border:1px solid rgba(13,13,13,.1);border-radius:18px;padding:34px;display:flex;align-items:center;justify-content:center;background:#fff;\"><img src=\"ea9f71b3-7c11-43ef-9dae-f625c278717e\" alt=\"Padelier gold\" style=\"max-width:100%;height:auto;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">The mark &amp; app icon<\u002Fh3>\n    <p style=\"max-width:64ch;\">A serif \"P\" paired with the gold ball — recognisable from across a home screen, and the same idea as the wordmark's tittle so the system feels of a piece.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;\"><img src=\"7bc4d2b7-e174-44d9-b922-6c5242d36231\" alt=\"App icon graphite\" style=\"width:120px;height:120px;border-radius:27px;\"><div style=\"font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8A8A;font-weight:600;\">App icon · graphite<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;\"><img src=\"a192d57d-0045-4509-9602-4639c6712953\" alt=\"App icon ivory\" style=\"width:120px;height:120px;border-radius:27px;border:1px solid rgba(13,13,13,.1);\"><div style=\"font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8A8A;font-weight:600;\">App icon · ivory<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;\"><div style=\"background:#0D0D0D;border-radius:26px;padding:22px;\"><img src=\"492712cd-0593-4587-b9bf-de0f5ac2c9bd\" alt=\"Monogram gold\" style=\"width:76px;height:76px;\"><\u002Fdiv><div style=\"font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8A8A;font-weight:600;\">Monogram · gold<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Clear space &amp; minimum size<\u002Fh3>\n    <p style=\"max-width:64ch;\">Keep clear space around the wordmark equal to the height of the gold ball on all sides. Minimum wordmark width: 96px on screen. The mark stays legible down to a 44px tap target; below that, drop to the monogram alone.<\u002Fp>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Misuse<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\">\n      <sc-for list=\"{{ misuse }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <div style=\"border:1px solid rgba(13,13,13,.1);border-radius:12px;padding:16px;background:#fff;text-align:center;font-size:12.5px;color:#4a4944;\"><span style=\"color:#D36A4A;font-weight:700;\">✕<\u002Fspan><br>{{ m }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Files delivered<\u002Fh3>\n    <div style=\"border:1px solid rgba(13,13,13,.1);border-radius:14px;overflow:hidden;\">\n      <sc-for list=\"{{ files }}\" as=\"fl\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;justify-content:space-between;padding:11px 16px;border-top:1px solid rgba(13,13,13,.06);font-size:14px;background:#fff;\">\n          <span>{{ fl.name }}<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk';color:#8A8A8A;font-size:12.5px;\">{{ fl.type }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 COLOR -->\n  <section id=\"color\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">10<\u002Fspan>Color<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Quiet luxury, with a pulse.<\u002Fdiv>\n    <p style=\"max-width:64ch;margin-top:10px;\">Graphite / Ivory / Champagne Gold at the core, plus <strong>Court Lime<\u002Fstrong> reserved for live and in-progress moments — so the app reads as alive, not just elegant.<\u002Fp>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Core<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\">\n      <sc-for list=\"{{ coreColors }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div style=\"border-radius:14px;overflow:hidden;border:1px solid rgba(13,13,13,.1);background:#fff;\">\n          <div style=\"height:88px;background:{{ c.hex }};\"><\u002Fdiv>\n          <div style=\"padding:11px 13px;\"><div style=\"font-weight:600;font-size:13.5px;\">{{ c.name }}<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:12px;color:#8A8A8A;text-transform:uppercase;\">{{ c.hex }}<\u002Fdiv><div style=\"font-size:12px;color:#4a4944;margin-top:6px;line-height:1.4;\">{{ c.use }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Signature &amp; energy<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\">\n      <sc-for list=\"{{ energyColors }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div style=\"border-radius:14px;overflow:hidden;border:1px solid rgba(13,13,13,.1);background:#fff;\">\n          <div style=\"height:88px;background:{{ c.hex }};\"><\u002Fdiv>\n          <div style=\"padding:11px 13px;\"><div style=\"font-weight:600;font-size:13.5px;\">{{ c.name }}<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:12px;color:#8A8A8A;text-transform:uppercase;\">{{ c.hex }}<\u002Fdiv><div style=\"font-size:12px;color:#4a4944;margin-top:6px;line-height:1.4;\">{{ c.use }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Usage &amp; accessibility<\u002Fh3>\n    <p style=\"max-width:64ch;\">Two accents, two jobs: <strong>Gold<\u002Fstrong> means crafted / earned (achievement, brand moments); <strong>Lime<\u002Fstrong> means live / now (active states). For text, use Graphite on Ivory or Ivory on Graphite — Gold is an accent, never body text, since it fails contrast at small sizes on light backgrounds. Lime sits on Graphite for maximum punch; avoid Lime on Ivory for anything small.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 11 TYPE -->\n  <section id=\"type\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">11<\u002Fspan>Typography<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Editorial serif, clean sans, honest numbers.<\u002Fdiv>\n    <p style=\"max-width:64ch;margin-top:10px;\">The wordmark ships as fixed vector outlines built on a warm serif (Lora), so it needs no font installed. Fraunces plays the same editorial role live across the rest of the brand and app — a close cousin, used for headline moments.<\u002Fp>\n    <sc-for list=\"{{ typeSpecs }}\" as=\"t\" hint-placeholder-count=\"3\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:30px;margin-bottom:16px;\">\n        <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#BFA36A;font-weight:700;\">{{ t.role }}<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8A8A8A;margin-bottom:14px;\">{{ t.name }}<\u002Fdiv>\n        <div style=\"{{ t.style }}\">{{ t.sample }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fsection>\n\n  <!-- 12 IMAGERY -->\n  <section id=\"imagery\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">12<\u002Fspan>Imagery<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Warm, human, natural light.<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:22px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Shoot<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">The moments, not the athletes.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">Natural light. Glass courts, wood, concrete, morning coffee. The handshake at the net, the huddle over standings on a phone. Real texture, real friends.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Avoid<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">The stock-sport clichés.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">No screaming athletes, motion-blur drama, or fist-pump energy-drink stock. Padelier is the after, the between, the belonging.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"color:#8A8A8A;font-size:13px;margin-top:14px;\">If a shot feels like an advert, it's wrong; if it feels like a memory, it's right.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px;\">\n      <sc-for list=\"{{ imagery }}\" as=\"im\" hint-placeholder-count=\"3\">\n        <div style=\"aspect-ratio:4/5;border-radius:14px;background:repeating-linear-gradient(135deg,#efece7,#efece7 10px,#e2ddd4 10px,#e2ddd4 20px);display:flex;align-items:center;justify-content:center;padding:16px;text-align:center;border:1px solid rgba(13,13,13,.06);\">\n          <div style=\"font-family:'Space Grotesk';font-size:12px;color:#8A8A8A;\">{{ im }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 CRAFT / MOTION -->\n  <section id=\"craft\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">13<\u002Fspan>Iconography &amp; Motion<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Details that disappear.<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:22px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Iconography<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Rounded, 2px, quiet.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0 0 16px;\">One consistent stroke weight, rounded caps and joins, generous corners. Icons support, never decorate.<\u002Fp>\n        <div style=\"display:flex;gap:24px;align-items:center;\"><div style=\"width:36px;height:36px;border-radius:50%;border:2px solid #0D0D0D;\"><\u002Fdiv><div style=\"width:36px;height:36px;border:2px solid #0D0D0D;border-radius:8px;position:relative;\"><div style=\"position:absolute;left:0;right:0;top:50%;height:2px;background:#0D0D0D;\"><\u002Fdiv><div style=\"position:absolute;top:0;bottom:0;left:50%;width:2px;background:#0D0D0D;\"><\u002Fdiv><\u002Fdiv><div style=\"width:8px;height:8px;border-radius:50%;background:#BFA36A;\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Motion<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Effortless, ~250ms, soft.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">Everything eases gently in and out at roughly 250ms. No bounce, no overshoot. Motion should feel like flow — the same thing the product protects on court.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:18px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Sound<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">Soft &amp; satisfying.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">A quiet, tactile confirmation on score entry. Never arcade beeps. If in doubt, silent.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\"><div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">The gold ball<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:22px;margin:2px 0 10px;\">The one recurring signature.<\u002Fdiv><p style=\"font-size:14.5px;color:#4a4944;margin:0;\">A loading dot, a live indicator, the tittle on an \"i,\" a bullet in a list. Used with restraint, it ties everything together.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 IN THE APP -->\n  <section id=\"inapp\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">14<\u002Fspan>In the App<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Where the brand shows up.<\u002Fdiv>\n    <sc-for list=\"{{ moments }}\" as=\"m\" hint-placeholder-count=\"5\">\n      <div style=\"display:grid;grid-template-columns:150px 1fr;gap:20px;align-items:start;border-top:1px solid rgba(13,13,13,.06);padding:20px 0;\">\n        <div style=\"font-family:'Fraunces';font-size:17px;color:#BFA36A;\">{{ m.when }}<\u002Fdiv>\n        <p style=\"margin:0;font-size:15px;\">{{ m.desc }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"background:#0D0D0D;color:#F7F5F2;border-radius:20px;padding:36px 40px;margin-top:20px;\"><div style=\"font-family:'Fraunces';font-size:clamp(20px,3vw,28px);\">One rule of thumb for design: <em style=\"color:#BFA36A;font-style:italic;\">airy and premium everywhere it can be — dense and honest wherever the game is actually being played.<\u002Fem><\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 UI COMPONENTS -->\n  <section id=\"ui\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">15<\u002Fspan>UI &amp; Components<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Every screen, from the same system.<\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Buttons<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:22px;\">\n      <sc-for list=\"{{ buttons }}\" as=\"b\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\">\n          <div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin-bottom:16px;\">{{ b.label }}<\u002Fdiv>\n          <button style=\"{{ b.style }}\">{{ b.text }}<\u002Fbutton>\n          <p style=\"font-size:13px;color:#4a4944;margin:14px 0 0;\">{{ b.desc }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Tags &amp; status<\u002Fh3>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;\">\n      <sc-for list=\"{{ tags }}\" as=\"tg\" hint-placeholder-count=\"6\">\n        <div style=\"{{ tg.style }}\">\n          <sc-if value=\"{{ tg.dot }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:{{ tg.dotColor }};display:inline-block;margin-right:8px;\"><\u002Fspan>\n          <\u002Fsc-if>\n          {{ tg.text }}\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Form controls<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\">\n        <div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin-bottom:14px;\">Text field<\u002Fdiv>\n        <label style=\"font-size:12px;color:#8A8A8A;letter-spacing:0.04em;\">Session name<\u002Flabel>\n        <input type=\"text\" placeholder=\"Thursday night doubles\" style=\"width:100%;box-sizing:border-box;margin-top:6px;padding:13px 16px;border-radius:12px;border:1px solid #D6D3CE;background:#F7F5F2;font-family:'Inter';font-size:15px;color:#141412;\">\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\">\n        <div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin-bottom:14px;\">Player count stepper<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;\">\n          <div style=\"width:40px;height:40px;border-radius:50%;border:1.5px solid #0D0D0D;display:flex;align-items:center;justify-content:center;font-size:20px;\">–<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-size:28px;font-weight:600;width:40px;text-align:center;\">12<\u002Fdiv>\n          <div style=\"width:40px;height:40px;border-radius:50%;background:#0D0D0D;color:#F7F5F2;display:flex;align-items:center;justify-content:center;font-size:20px;\">+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;margin-top:22px;\">\n      <div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin-bottom:14px;\">Format picker · segmented control<\u002Fdiv>\n      <div style=\"display:flex;background:#F7F5F2;border-radius:99px;padding:4px;gap:4px;max-width:520px;\">\n        <sc-for list=\"{{ formats }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <div style=\"{{ f.style }}\">{{ f.name }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Cards<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\">\n        <div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Session card<\u002Fdiv>\n        <div style=\"font-family:'Fraunces';font-size:22px;margin:4px 0 10px;\">Thursday Night Doubles<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8A8A8A;\">12 players · Americano · 3 courts<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;margin-top:16px;border-top:1px solid rgba(13,13,13,.06);padding-top:14px;\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#C4E24B;display:inline-block;\"><\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#0D0D0D;font-weight:700;\">Live · Round 4 of 6<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:26px;\">\n        <div style=\"font-family:'Fraunces';font-size:15px;color:#BFA36A;font-weight:600;\">Player row<\u002Fdiv>\n        <sc-for list=\"{{ players }}\" as=\"pl\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid rgba(13,13,13,.06);\">\n            <div style=\"display:flex;align-items:center;gap:12px;\"><div style=\"width:34px;height:34px;border-radius:50%;background:#D6D3CE;\"><\u002Fdiv><div style=\"font-size:15px;\">{{ pl.name }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"{{ pl.style }}\">{{ pl.status }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Score entry<\u002Fh3>\n    <div style=\"background:#0D0D0D;color:#F7F5F2;border-radius:20px;padding:40px;\">\n      <div style=\"font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#8A8A8A;text-align:center;\">Round 3 · Court 2<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:36px;margin-top:22px;\">\n        <div style=\"text-align:center;\"><div style=\"font-size:13px;color:#D6D3CE;margin-bottom:8px;\">Adam &amp; Priya<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:64px;font-weight:600;\">21<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk';font-size:40px;color:#8A8A8A;\">–<\u002Fdiv>\n        <div style=\"text-align:center;\"><div style=\"font-size:13px;color:#D6D3CE;margin-bottom:8px;\">Marc &amp; Nora<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-size:64px;font-weight:600;\">14<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <button style=\"display:block;margin:28px auto 0;background:#2E8B57;color:#F7F5F2;border:none;border-radius:99px;padding:15px 40px;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;\">Confirm score<\u002Fbutton>\n    <\u002Fdiv>\n    <p style=\"max-width:64ch;color:#33322e;margin-top:14px;\">Big Space Grotesk numerals for a one-handed, in-sunlight glance. Confirmation is a quiet emerald tick and a re-sort — never confetti.<\u002Fp>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Live standings<\u002Fh3>\n    <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:8px 26px;\">\n      <sc-for list=\"{{ standings }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid rgba(13,13,13,.06);\">\n          <div style=\"display:flex;align-items:center;gap:16px;\">\n            <div style=\"font-family:'Space Grotesk';font-weight:600;width:20px;color:{{ s.rankColor }};\">{{ s.rank }}<\u002Fdiv>\n            <div style=\"font-size:15px;\">{{ s.name }}<\u002Fdiv>\n            <sc-if value=\"{{ s.live }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:#C4E24B;display:inline-block;\"><\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px;color:#BFA36A;\">{{ s.pts }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Navigation<\u002Fh3>\n    <div style=\"background:#0D0D0D;border-radius:16px;padding:18px 26px;display:flex;justify-content:space-between;align-items:center;\">\n      <img src=\"0b78e149-5aab-4ca8-8ca9-935b330ac85a\" alt=\"Padelier\" style=\"height:20px;width:auto;\">\n      <div style=\"display:flex;gap:18px;\"><div style=\"width:22px;height:22px;border:1.5px solid #F7F5F2;border-radius:50%;\"><\u002Fdiv><div style=\"width:22px;height:22px;border:1.5px solid #F7F5F2;\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-around;background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:16px 0;margin-top:14px;max-width:420px;\">\n      <sc-for list=\"{{ tabs }}\" as=\"tb\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;\"><div style=\"{{ tb.iconStyle }}\"><\u002Fdiv><div style=\"font-size:11px;color:{{ tb.color }};\">{{ tb.label }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Dialog<\u002Fh3>\n    <div style=\"background:#D6D3CE;border-radius:16px;padding:48px;display:flex;justify-content:center;\">\n      <div style=\"background:#F7F5F2;border-radius:16px;padding:30px;max-width:340px;width:100%;\">\n        <div style=\"font-family:'Fraunces';font-size:20px;\">End this session?<\u002Fdiv>\n        <p style=\"font-size:14px;color:#4a4944;margin:10px 0 22px;\">Standings will be saved and shared with everyone in the game.<\u002Fp>\n        <div style=\"display:flex;gap:10px;\">\n          <button style=\"flex:1;background:transparent;border:1px solid #D6D3CE;border-radius:99px;padding:12px;font-family:'Inter';font-weight:600;font-size:14px;color:#141412;cursor:pointer;\">Cancel<\u002Fbutton>\n          <button style=\"flex:1;background:#0D0D0D;color:#F7F5F2;border:none;border-radius:99px;padding:12px;font-family:'Inter';font-weight:600;font-size:14px;cursor:pointer;\">End session<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 style=\"font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A8A;font-weight:700;margin:32px 0 14px;\">Two registers<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n      <div style=\"background:#fff;border:1px solid rgba(13,13,13,.1);border-radius:16px;padding:34px;\">\n        <div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#BFA36A;font-weight:700;\">Considered setup<\u002Fdiv>\n        <div style=\"font-family:'Fraunces';font-size:24px;margin-top:12px;\">Create a session<\u002Fdiv>\n        <p style=\"font-size:14px;color:#4a4944;margin-top:10px;\">Whitespace. Large Fraunces headings. One clear action per step.<\u002Fp>\n        <button style=\"margin-top:20px;background:#0D0D0D;color:#F7F5F2;border:none;border-radius:99px;padding:14px 28px;font-family:'Inter';font-weight:600;font-size:14px;\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"background:#0D0D0D;color:#F7F5F2;border-radius:16px;padding:34px;\">\n        <div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#C4E24B;font-weight:700;\">Courtside mode<\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk';font-size:44px;font-weight:600;margin-top:12px;\">21 – 14<\u002Fdiv>\n        <p style=\"font-size:13px;color:#8A8A8A;margin-top:10px;\">High contrast, big numerals, dense glanceable layout. Legible beats luxurious here.<\u002Fp>\n        <button style=\"margin-top:20px;background:#2E8B57;color:#F7F5F2;border:none;border-radius:99px;padding:14px 28px;font-family:'Inter';font-weight:600;font-size:14px;\">Confirm<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16 RECAP -->\n  <section id=\"recap\" style=\"max-width:960px;margin:0 auto;padding:56px 32px;border-top:1px solid rgba(13,13,13,.06);\">\n    <p style=\"font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#BFA36A;font-weight:600;\"><span style=\"color:#8A8A8A;margin-right:12px;\">16<\u002Fspan>Quick Reference<\u002Fp>\n    <div style=\"font-family:'Fraunces';font-weight:500;font-size:clamp(28px,4vw,40px);margin-top:6px;\">Padelier on one page.<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px;\">\n      <sc-for list=\"{{ recap }}\" as=\"r\" hint-placeholder-count=\"12\">\n        <div style=\"border:1px solid rgba(13,13,13,.1);border-radius:12px;padding:16px 18px;background:#fff;\"><div style=\"font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8A8A8A;font-weight:700;\">{{ r.k }}<\u002Fdiv><div style=\"font-family:'Fraunces';font-size:18px;margin-top:3px;\">{{ r.v }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#0D0D0D;color:#8A8A8A;padding:50px 32px;font-size:13px;\">\n    <div style=\"max-width:960px;margin:0 auto;\">\n      <img src=\"0b78e149-5aab-4ca8-8ca9-935b330ac85a\" alt=\"Padelier\" style=\"height:26px;width:auto;\">\n      <p style=\"margin-top:12px;max-width:60ch;\">Brand, logo, and UI guidelines v1.0 — one source of truth, ready to hand to design, product, and engineering.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      toc: [\n        { n: \"01\", label: \"What Padelier Is\", href: \"#what\" },\n        { n: \"02\", label: \"Foundation\", href: \"#foundation\" },\n        { n: \"03\", label: \"The Name\", href: \"#name\" },\n        { n: \"04\", label: \"Brand Pillars\", href: \"#pillars\" },\n        { n: \"05\", label: \"Personality & Archetype\", href: \"#personality\" },\n        { n: \"06\", label: \"Voice & Tone\", href: \"#voice\" },\n        { n: \"07\", label: \"Audience\", href: \"#audience\" },\n        { n: \"08\", label: \"Messaging\", href: \"#messaging\" },\n        { n: \"09\", label: \"Logo\", href: \"#logo\" },\n        { n: \"10\", label: \"Color\", href: \"#color\" },\n        { n: \"11\", label: \"Typography\", href: \"#type\" },\n        { n: \"12\", label: \"Imagery\", href: \"#imagery\" },\n        { n: \"13\", label: \"Iconography & Motion\", href: \"#craft\" },\n        { n: \"14\", label: \"In the App\", href: \"#inapp\" },\n        { n: \"15\", label: \"UI & Components\", href: \"#ui\" },\n        { n: \"16\", label: \"Quick Reference\", href: \"#recap\" },\n      ],\n      foundation: [\n        { k: \"Purpose\", h: \"Make every game a fair game.\", p: \"No one sits out unfairly. Everyone gets a fair mix of partners and opponents. The session simply flows.\" },\n        { k: \"Vision\", h: \"The most trusted way to run social padel.\", p: \"Wherever people gather to play, Padelier is the tool that runs the session — quietly, fairly, beautifully.\" },\n        { k: \"Mission\", h: \"Give every host a tool that feels effortless.\", p: \"Turn the messy logistics of rotations, scoring, and standings into something that takes one tap and looks considered.\" },\n        { k: \"Promise\", h: \"Fair rotations. Real standings. Zero napkin math.\", p: \"Every match balanced. Every player included. Every result honest.\" },\n      ],\n      pillars: [\n        { idx: \"01\", title: \"Fair by design\", desc: \"Fairness isn't a value we talk about — it's compiled into the rotation engine. Nobody keeps resting, everybody gets a fair spread of partners and opponents, courts stay full.\", feat: \"the fairness rotation engine\" },\n        { idx: \"02\", title: \"Effortless flow\", desc: \"The session should run itself. One tap to score, rotations generated for you, the next round ready before you ask.\", feat: \"one-tap scoring & auto rotations\" },\n        { idx: \"03\", title: \"Alive in the moment\", desc: \"A session should feel like an event. Standings move as you play, and a shareable live view lets anyone watch the leaderboard climb in real time.\", feat: \"live standings & the spectator view\" },\n        { idx: \"04\", title: \"Hosted with care\", desc: \"Every detail is considered so the host looks effortless and every player feels included. Warmth over flash. Belonging over hierarchy.\", feat: \"the whole experience\" },\n      ],\n      personalityBars: [\n        { label: \"Craft & polish\", pct: 35, color: \"#BFA36A\" },\n        { label: \"Community & warmth\", pct: 25, color: \"#2E8B57\" },\n        { label: \"Sport & energy\", pct: 25, color: \"#C4E24B\" },\n        { label: \"Technology\", pct: 15, color: \"#0D0D0D\" },\n      ],\n      keywords: [\"Considered\", \"Warm\", \"Fair\", \"Effortless\", \"Confident\", \"Hospitable\", \"Refined\", \"Alive\", \"Honest\", \"Timeless\", \"Precise\"],\n      voice: [\n        { dont: \"Congratulations!! \\u{1F389}\\u{1F389}\", do: \"You moved up two places.\" },\n        { dont: \"Amazing win!!!\", do: \"Well played.\" },\n        { dont: \"Generating your optimal fair-rotation algorithm\\u2026\", do: \"Sorting the next round. Everyone gets a fair game.\" },\n        { dont: \"You are on the bench this round.\", do: \"You're resting this round \\u2014 back on court next.\" },\n        { dont: \"Match 3 starts in 60 minutes.\", do: \"Your court is ready.\" },\n      ],\n      altTaglines: [\n        { line: \"Every game, a fair game.\", note: \"Leads with the fairness soul. Best when the message is trust and inclusion.\" },\n        { line: \"Host the perfect game.\", note: \"Speaks straight to the host. Best for acquisition aimed at organisers.\" },\n        { line: \"Run the game. Own the moment.\", note: \"More energy; pairs well with the live / spectator angle.\" },\n        { line: \"Elevating the social game.\", note: \"Kept as a positioning descriptor rather than the lead tagline.\" },\n      ],\n      keyMessages: [\n        { k: \"To the host\", p: \"\\u201cLook effortless. We'll handle the rotations, the scoring, and the standings.\\u201d\" },\n        { k: \"To the player\", p: \"\\u201cYou'll always get a fair game \\u2014 and you'll always know where you stand.\\u201d\" },\n        { k: \"To the market\", p: \"\\u201cOthers book the court. Padelier runs the play.\\u201d\" },\n      ],\n      misuse: [\"Don't stretch or condense\", \"Don't recolour the ball off orting the next round. Everyone gets a fair game, a fair rest, and a fair set of partners.\" },\n        { role: \"Numerals / Score\", name: \"Space Grotesk — technical, tabular figures for live scoring & standings\", style: \"font-family:'Space Grotesk';font-weight:600;font-size:38px;\", sample: \"21 – 14\" },\n      ],\n      imagery: [\"Action shot \\u2014 mid-rally, natural light\", \"Overhead court, full session in view\", \"Candid moment \\u2014 high five between rounds\"],\n      moments: [\n        { when: \"Creating a session\", desc: \"Calm and airy. Whitespace, large Fraunces headings, one clear action per step. This is a considered setup, not a form to survive.\" },\n        { when: \"Courtside mode\", desc: \"The exception to the whitespace rule. Live scoring is used one-handed, in sunlight, mid-session — high contrast, big Space Grotesk numbers, dense glanceable layout, and lime for what's live.\" },\n        { when: \"Recording a score\", desc: \"One tap. A soft confirmation, an emerald tick, standings quietly re-sorting. \\u201cWell played.\\u201d \\u2014 never \\u201cAMAZING!!\\u201d.\" },\n        { when: \"Resting a round\", desc: \"The most important tone moment. Never \\u201cbenched.\\u201d Always \\u201cresting this round \\u2014 back on court next.\\u201d Fairness, spoken kindly.\" },\n        { when: \"The spectator view\", desc: \"The shareable live screen is the brand's stage: graphite, gold, a lime live-dot, standings climbing in real time.\" },\n      ],\n      buttons: [\n        { label: \"Primary\", text: \"Start Round 4\", desc: \"Graphite fill, ivory label. The default action everywhere.\", style: \"background:#0D0D0D;color:#F7F5F2;border:none;border-radius:99px;padding:14px 28px;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;\" },\n        { label: \"Secondary\", text: \"Invite players\", desc: \"Outline only. For a supporting action beside a primary.\", style: \"background:transparent;color:#0D0D0D;border:1.5px solid #0D0D0D;border-radius:99px;padding:13px 27px;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;\" },\n        { label: \"Ghost\", text: \"Skip for now\", desc: \"Text only, no border. Low-emphasis, dismissible actions.\", style: \"background:transparent;color:#4a4944;border:none;padding:14px 8px;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;\" },\n        { label: \"Gold · earned\", text: \"Upgrade to Host+\", desc: \"Reserved for genuinely premium moments — never a default.\", style: \"background:#BFA36A;color:#0D0D0D;border:none;border-radius:99px;padding:14px 28px;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;\" },\n      ],\n      tags: [\n        { text: \"\\u25CF Live\", dot: true, dotColor: \"#C4E24B\", style: \"background:#0D0D0D;color:#F7F5F2;border-radius:99px;padding:8px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;\" },\n        { text: \"Resting this round\", dot: false, style: \"background:#fff;border:1px solid #D6D3CE;color:#4a4944;border-radius:99px;padding:8px 16px;font-size:13px;\" },\n        { text: \"Won\", dot: false, style: \"background:#e8f3ec;color:#2E8B57;border-radius:99px;padding:8px 16px;font-size:13px;font-weight:600;\" },\n        { text: \"Lost\", dot: false, style: \"background:#fbeee9;color:#D36A4A;border-radius:99px;padding:8px 16px;font-size:13px;font-weight:600;\" },\n        { text: \"Americano\", dot: false, style: \"background:#fff;border:1px solid #D6D3CE;color:#141412;border-radius:99px;padding:8px 16px;font-size:13px;\" },\n        { text: \"Earned · Host+\", dot: false, style: \"background:#f7f0e3;color:#8a6d33;border-radius:99px;padding:8px 16px;font-size:13px;font-weight:600;\" },\n      ],\n      formats: [\n        { name: \"Americano\", style: \"flex:1;text-align:center;padding:10px;border-radius:99px;background:#0D0D0D;color:#F7F5F2;font-size:13px;font-weight:600;\" },\n        { name: \"Mexicano\", style: \"flex:1;text-align:center;padding:10px;border-radius:99px;color:#4a4944;font-size:13px;\" },\n        { name: \"Fixed pairs\", style: \"flex:1;text-align:center;padding:10px;border-radius:99px;color:#4a4944;font-size:13px;\" },\n        { name: \"Team\", style: \"flex:1;text-align:center;padding:10px;border-radius:99px;color:#4a4944;font-size:13px;\" },\n      ],\n      players: [\n        { name: \"Adam Chen\", status: \"On court\", style: \"font-size:12px;color:#2E8B57;font-weight:600;\" },\n        { name: \"Priya Nair\", status: \"On court\", style: \"font-size:12px;color:#2E8B57;font-weight:600;\" },\n        { name: \"Marc Osei\", status: \"Resting\", style: \"font-size:12px;color:#8A8A8A;\" },\n      ],\n      standings: [\n        { rank: \"1\", name: \"Adam Chen\", pts: \"48 pts\", rankColor: \"#BFA36A\", live: true },\n        { rank: \"2\", name: \"Priya Nair\", pts: \"41 pts\", rankColor: \"#141412\", live: false },\n        { rank: \"3\", name: \"Marc Osei\", pts: \"37 pts\", rankColor: \"#141412\", live: false },\n        { rank: \"4\", name: \"Nora Fields\", pts: \"29 pts\", rankColor: \"#8A8A8A\", live: false },\n      ],\n      tabs: [\n        { label: \"Sessions\", color: \"#0D0D0D\", iconStyle: \"width:20px;height:20px;border:2px solid #0D0D0D;border-radius:6px;\" },\n        { label: \"Live\", color: \"#BFA36A\", iconStyle: \"width:20px;height:20px;border-radius:50%;background:#C4E24B;\" },\n        { label: \"Profile\", color: \"#8A8A8A\", iconStyle: \"width:20px;height:20px;border:2px solid #8A8A8A;border-radius:50%;\" },\n      ],\n      recap: [\n        { k: \"What it is\", v: \"The host's tool for running a fair, live padel session.\" },\n        { k: \"Soul\", v: \"Fairness, flow & the well-hosted game.\" },\n        { k: \"Name idea\", v: \"A padelier = the host who curates the game.\" },\n        { k: \"Tagline\", v: \"The art of a great game.\" },\n        { k: \"Personality\", v: \"Gracious host who knows the game cold.\" },\n        { k: \"Voice\", v: \"Warm confidence. We don't shout.\" },\n        { k: \"Premium means\", v: \"Thoughtful — not exclusive.\" },\n        { k: \"Palette\", v: \"Graphite · Ivory · Champagne Gold + Court Lime for live.\" },\n        { k: \"Type\", v: \"Fraunces · Inter · Space Grotesk (wordmark: Lora outlines).\" },\n        { k: \"Signature\", v: \"The gold ball — the brand's punctuation.\" },\n        { k: \"Position\", v: \"Others book the court. Padelier runs the play.\" },\n        { k: \"North star\", v: \"\\u201cI'm part of something special.\\u201d\" },\n      ],\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
